<script>
        // Simple password strength visualization logic for demonstration
        const passwordInput = document.getElementById('password');
        const strengthBar = document.querySelector('.bg-primary.rounded-full');
        const strengthText = document.querySelector('.text-primary.uppercase');

        if(passwordInput && strengthBar && strengthText) {
            passwordInput.addEventListener('input', function() {
                const val = this.value;
                if(val.length === 0) {
                    strengthBar.style.width = '0%';
                    strengthText.textContent = '';
                } else if (val.length < 6) {
                    strengthBar.style.width = '33%';
                    strengthBar.className = 'h-full w-1/3 bg-error rounded-full shadow-[0_0_8px_rgba(255,180,171,0.6)] transition-all duration-300';
                    strengthText.textContent = 'Weak';
                    strengthText.className = 'font-label-sm text-label-sm text-error tracking-normal uppercase';
                } else if (val.length < 10) {
                    strengthBar.style.width = '66%';
                    strengthBar.className = 'h-full w-2/3 bg-primary rounded-full shadow-[0_0_8px_rgba(242,202,80,0.6)] transition-all duration-300';
                    strengthText.textContent = 'Good';
                    strengthText.className = 'font-label-sm text-label-sm text-primary tracking-normal uppercase';
                } else {
                    strengthBar.style.width = '100%';
                    strengthText.textContent = 'Strong';
                }
            });
        }
    </script>
