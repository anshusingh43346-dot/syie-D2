<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SYIE - Password Reset Flow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#554300",
                        "background": "#131313",
                        "on-tertiary-container": "#484539",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary": "#333025",
                        "primary": "#f2ca50",
                        "tertiary-container": "#b8b3a3",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "on-error-container": "#ffdad6",
                        "on-primary": "#3c2f00",
                        "surface-container": "#201f1f",
                        "secondary": "#cabeff",
                        "surface": "#131313",
                        "on-primary-fixed-variant": "#574500",
                        "tertiary-fixed-dim": "#ccc6b6",
                        "on-surface-variant": "#d0c5af",
                        "inverse-surface": "#e5e2e1",
                        "error-container": "#93000a",
                        "outline": "#99907c",
                        "inverse-primary": "#735c00",
                        "tertiary-fixed": "#e9e2d2",
                        "primary-fixed-dim": "#e9c349",
                        "on-secondary-container": "#b9aaff",
                        "surface-tint": "#e9c349",
                        "secondary-fixed-dim": "#cabeff",
                        "secondary-fixed": "#e6deff",
                        "primary-fixed": "#ffe088",
                        "on-primary-fixed": "#241a00",
                        "on-error": "#690005",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "tertiary": "#d4cebe",
                        "surface-dim": "#131313",
                        "inverse-on-surface": "#313030",
                        "secondary-container": "#4816cb",
                        "error": "#ffb4ab",
                        "surface-bright": "#3a3939",
                        "primary-container": "#d4af37",
                        "outline-variant": "#4d4635",
                        "on-secondary-fixed": "#1c0062",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-fixed-variant": "#4a473b",
                        "surface-container-highest": "#353534",
                        "on-secondary": "#31009a",
                        "on-tertiary-fixed": "#1e1c12",
                        "on-secondary-fixed-variant": "#4816cb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",
                        "margin-mobile": "20px",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "body-md": ["Inter"],
                        "display-sm": ["Playfair Display"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Playfair Display"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["30px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-sm": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .atmospheric-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(19, 19, 19, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .input-glass {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #4d4635; /* outline-variant */
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            border-color: #d4af37; /* primary-container */
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
            outline: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen relative overflow-x-hidden font-body-md flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Atmospheric Lighting -->
<div class="atmospheric-glow top-[-100px] left-[-200px]"></div>
<div class="atmospheric-glow bottom-[-200px] right-[-100px]" style="background: radial-gradient(circle, rgba(124, 92, 255, 0.1) 0%, rgba(19, 19, 19, 0) 70%);"></div>
<main class="w-full max-w-container-max mx-auto flex flex-col md:flex-row gap-gutter items-stretch justify-center z-10">
<!-- State A: Reset Password Card -->
<section class="glass-panel rounded-xl p-8 md:p-12 w-full max-w-md flex flex-col items-center justify-center relative shadow-2xl">
<!-- SYIE Logo Anchor -->
<div class="mb-8">
<span class="font-display-sm text-display-sm text-primary tracking-tighter">SYIE</span>
</div>
<div class="text-center mb-8 w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email to receive a secure link.</p>
</div>
<form class="w-full flex flex-col gap-6" onsubmit="event.preventDefault(); showToast();">
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="email-reset">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 text-on-surface font-body-md" id="email-reset" placeholder="investor@domain.com" required="" type="email"/>
</div>
</div>
<button class="bg-primary-container text-[#111111] font-label-md text-label-md py-4 rounded-lg w-full transition-transform active:scale-95 hover:bg-primary uppercase tracking-wider font-bold" type="submit">
                    Send Reset Link
                </button>
</form>
<div class="mt-8 text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-2" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Back to login
                </a>
</div>
</section>
<!-- State B: Set New Password Card -->
<section class="glass-panel rounded-xl p-8 md:p-12 w-full max-w-md flex flex-col items-center justify-center relative shadow-2xl border-primary/20">
<!-- Active State Accent -->
<div class="absolute inset-0 rounded-xl border border-primary/20 pointer-events-none mix-blend-overlay"></div>
<!-- SYIE Logo Anchor -->
<div class="mb-8">
<span class="font-display-sm text-display-sm text-primary tracking-tighter">SYIE</span>
</div>
<div class="text-center mb-8 w-full">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Set New Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Choose a secure password for your vault.</p>
</div>
<form class="w-full flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="new-password">New Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-10 text-on-surface font-body-md" id="new-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword('new-password')" type="button">
<span class="material-symbols-outlined text-[20px]" id="icon-new-password">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="confirm-password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-10 text-on-surface font-body-md" id="confirm-password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" onclick="togglePassword('confirm-password')" type="button">
<span class="material-symbols-outlined text-[20px]" id="icon-confirm-password">visibility</span>
</button>
</div>
</div>
<button class="bg-primary-container text-[#111111] font-label-md text-label-md py-4 rounded-lg w-full transition-transform active:scale-95 hover:bg-primary uppercase tracking-wider font-bold mt-2" type="submit">
                    Update Password
                </button>
</form>
<!-- Password Strength Indicator (Simulated) -->
<div class="w-full mt-6 flex items-center gap-2">
<div class="h-1 flex-1 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3"></div>
</div>
<span class="font-label-sm text-label-sm text-primary">Strong</span>
</div>
</section>
</main>
<!-- Success Toast Notification -->
<div class="fixed bottom-margin-mobile md:bottom-margin-desktop left-1/2 -translate-x-1/2 glass-panel rounded-full px-6 py-3 flex items-center gap-3 transform translate-y-[150%] opacity-0 transition-all duration-500 ease-out z-50" id="toast">
<span class="material-symbols-outlined text-primary">check_circle</span>
<span class="font-body-md text-body-md text-on-surface">Reset link sent successfully.</span>
</div>
<script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(`icon-${inputId}`);
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.transform = 'translate(-50%, 0)';
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.transform = 'translate(-50%, 150%)';
                toast.style.opacity = '0';
            }, 3000);
        }
    </script>
</body></html>
