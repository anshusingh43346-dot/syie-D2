<!-- Split Layout Container -->

<!-- Left Panel: Brand Aesthetic (Hidden on Mobile) -->
<div class="hidden lg:flex flex-col justify-between w-1/2 p-margin-desktop border-r border-white/10 relative overflow-hidden bg-surface-container-lowest">

</div>
<!-- Content overlay -->
<div class="relative z-10">
<div class="font-display-lg text-display-lg text-primary tracking-tighter">SYIE</div>
</div>
<div class="relative z-10 max-w-md">
<h1 class="font-display-sm text-display-sm text-on-surface mb-6">The Gold Standard of Intellectual Exchange.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Access the private digital vault where sophisticated minds converge. Security, clarity, and excellence.</p>
</div>
</div>
<!-- Right Panel: Login Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-margin-mobile lg:p-margin-desktop">
<!-- Mobile Logo (Visible only on mobile) -->
<div class="absolute top-margin-mobile left-margin-mobile lg:hidden">
<div class="font-display-lg text-headline-lg-mobile text-primary tracking-tighter">SYIE</div>
</div>
<!-- Glassmorphic Login Card -->
<div class="glass-panel w-full max-w-md rounded-xl p-8 lg:p-12 shadow-[0_8px_32px_0_rgba(0,0,0,0.5)]">
<div class="mb-8 text-center lg:text-left">
<h2 class="font-display-sm text-headline-lg-mobile lg:text-display-sm text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your vault.</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_8px_rgba(212,175,55,0.3)] transition-all duration-300" id="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_0_8px_rgba(212,175,55,0.3)] transition-all duration-300" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5 border border-white/20 rounded bg-white/5 group-hover:border-primary transition-colors">
<input class="peer opacity-0 absolute inset-0 cursor-pointer" type="checkbox"/>
<span class="material-symbols-outlined text-[14px] text-primary opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none">check</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-secondary hover:text-secondary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary-container text-[#111111] font-label-md text-label-md py-4 rounded-lg hover:bg-primary transition-colors duration-300 shadow-[0_4px_12px_rgba(212,175,55,0.2)]" type="submit">

                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-[#1a1a1a] font-label-sm text-label-sm text-outline uppercase tracking-wider">Or continue with</span>
</div>
</div>

<p class="mt-8 text-center font-body-md text-body-md text-on-surface-variant">

</p>
