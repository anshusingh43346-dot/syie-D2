<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Booking Confirmation | SYIE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#e5e2e1",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-bright": "#3a3939",
                      "secondary-container": "#4816cb",
                      "on-primary-fixed-variant": "#574500",

                      "error-container": "#93000a",
                      "surface-container": "#201f1f",
                      "on-secondary": "#31009a",
                      "secondary-fixed": "#e6deff",
                      "error": "#ffb4ab",
                      "on-primary-container": "#554300",
                      "tertiary-fixed": "#e9e2d2",
                      "secondary-fixed-dim": "#cabeff",
                      "tertiary-fixed-dim": "#ccc6b6",
                      "on-tertiary-fixed-variant": "#4a473b",
                      "on-secondary-container": "#b9aaff",
                      "on-tertiary-fixed": "#1e1c12",
                      "on-surface": "#e5e2e1",
                      "on-error-container": "#ffdad6",
                      "secondary": "#cabeff",
                      "primary-container": "#d4af37",
                      "inverse-surface": "#e5e2e1",
                      "background": "#131313",
                      "inverse-primary": "#735c00",
                      "primary": "#f2ca50",
                      "surface-container-low": "#1c1b1b",
                      "on-tertiary-container": "#484539",

                      "surface-container-high": "#2a2a2a",
                      "surface-tint": "#e9c349",
                      "tertiary-container": "#b8b3a3",
                      "surface-variant": "#353534",
                      "surface-container-highest": "#353534",
                      "primary-fixed-dim": "#e9c349",
                      "on-secondary-fixed": "#1c0062",
                      "on-primary": "#3c2f00",
                      "tertiary": "#d4cebe",
                      "on-secondary-fixed-variant": "#4816cb",
                      "on-surface-variant": "#d0c5af",
                      "outline": "#99907c",
                      "on-primary-fixed": "#241a00",
                      "surface-dim": "#131313",
                      "surface": "#131313",
                      "inverse-on-surface": "#313030"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "margin-mobile": "20px",
                      "margin-desktop": "64px",
                      "gutter": "24px",
                      "unit": "8px",
                      "container-max": "1280px"
              },
              "fontFamily": {
                      "label-sm": ["Inter"],
                      "body-md": ["Inter"],
                      "display-lg": ["Playfair Display"],
                      "body-lg": ["Inter"],
                      "headline-lg-mobile": ["Playfair Display"],
                      "display-sm": ["Playfair Display"],
                      "headline-lg": ["Playfair Display"],
                      "label-md": ["Inter"]
              },
              "fontSize": {

<style>
        /* Ambient Glow Effect */
        .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.08) 0%, rgba(19, 19, 19, 0) 60%);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Atmospheric Background -->
<div class="absolute inset-0 z-0 pointer-events-none ambient-glow"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[520px]">
<!-- Glassmorphic Card -->
<div class="bg-surface/30 backdrop-blur-xl border border-white/10 rounded-lg p-8 md:p-10 shadow-2xl flex flex-col items-center">
<!-- Success Icon -->
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary-container/20 blur-xl rounded-full scale-150"></div>
<span class="material-symbols-outlined text-[64px] text-primary-container relative z-10" style="font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
</div>
<!-- Heading -->
<h1 class="font-display-sm text-display-sm text-on-background text-center mb-8">
                Session booked!
            </h1>
<!-- Details Section -->
<div class="w-full bg-white/5 rounded-lg border border-white/5 p-6 mb-6 flex flex-col gap-y-4">
<div class="flex justify-between items-center border-b border-white/5 pb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Mentor</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Sarah Chen</span>
</div>
<div class="flex justify-between items-center border-b border-white/5 pb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Date</span>
<span class="font-body-md text-body-md text-on-surface font-medium">October 24, 2024</span>
</div>
<div class="flex justify-between items-center border-b border-white/5 pb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Time</span>
<span class="font-body-md text-body-md text-on-surface font-medium">10:00 AM - 11:00 AM EST</span>
</div>
<div class="flex justify-between items-center border-b border-white/5 pb-4">
<span class="font-label-md text-label-md text-on-surface-variant">Duration</span>
<span class="font-body-md text-body-md text-on-surface font-medium">60 mins</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Amount</span>
<span class="font-body-md text-body-md text-primary-container font-medium">₹25,000</span>
</div>
</div>
<!-- Information Note -->
<p class="font-body-md text-body-md text-on-surface/60 text-center mb-8 px-4">
                The mentor will share the meeting link before your session.
            </p>
<!-- Actions -->
<div class="w-full flex flex-col gap-y-4">
<button class="w-full h-12 flex items-center justify-center gap-2 border border-primary-container text-primary-container rounded-lg font-label-md text-label-md hover:bg-primary-container/10 transition-colors duration-300">
<span class="material-symbols-outlined text-lg">calendar_add_on</span>
                    Add to calendar
                </button>
<button class="w-full h-14 bg-primary-container text-[#111111] rounded-lg font-label-md text-label-md shadow-[0_0_15px_rgba(212,175,55,0.2)] hover:shadow-[0_0_25px_rgba(212,175,55,0.4)] hover:brightness-110 transition-all duration-300">
                    View in my bookings
                </button>
<button class="w-full h-12 text-on-surface-variant hover:text-on-surface hover:bg-white/5 rounded-lg font-label-md text-label-md transition-colors duration-300 mt-2">
                    Back to home
                </button>
</div>
</div>
</main>
</body></html>
