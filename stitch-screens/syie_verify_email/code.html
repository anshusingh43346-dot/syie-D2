<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('otp-container');
            const inputs = container.querySelectorAll('.otp-input');
            const form = document.getElementById('otpForm');

            // Handle input logic for OTP
            inputs.forEach((input, index) => {
                // Focus behavior
                input.addEventListener('focus', (e) => {
                    e.target.select();
                });

                // Input handling
                input.addEventListener('input', (e) => {
                    // Only allow numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value !== '') {
                        // Move to next input if available
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        } else {
                            // If it's the last input, maybe auto-submit or just blur
                            inputs[index].blur();
                            // Optional: auto submit logic
                            // checkAllFilled();
                        }
                    }
                });

                // Backspace handling
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                            inputs[index - 1].value = ''; // clear previous on backspace
                        }
                    } else if (e.key === 'ArrowLeft') {
                         if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    } else if (e.key === 'ArrowRight') {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                });

                // Paste handling
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, inputs.length);
                    
                    for (let i = 0; i < pastedData.length; i++) {
                        if (i < inputs.length) {
                            inputs[i].value = pastedData[i];
                            if (i === pastedData.length - 1 || i === inputs.length - 1) {
                                inputs[i].focus();
                            }
                        }
                    }
                });
            });

            // Prevent form submit for demo
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let code = '';
                inputs.forEach(input => code += input.value);
                console.log('Submitting OTP:', code);
                // Add loading state or validation logic here
            });
        });
    </script>
